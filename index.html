<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Smart Farm BME280 USB</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/brain.js"></script>
</head>

<body class="bg-black text-white flex justify-center items-center min-h-screen p-4">

<div class="w-full max-w-4xl bg-white/10 p-6 rounded-3xl">

<h1 class="text-3xl text-green-400 text-center mb-4">
🌱 Smart Farm BME280
</h1>

<button id="connect"
class="bg-blue-500 w-full py-3 rounded-xl mb-4 font-bold">
🔌 เชื่อมต่อ USB
</button>

<!-- SENSOR -->
<div class="grid grid-cols-2 gap-4 mb-4">
  <div class="bg-black/40 p-4 rounded-xl text-center">
    🌡 <p id="temp" class="text-3xl">--</p>
  </div>
  <div class="bg-black/40 p-4 rounded-xl text-center">
    💧 <p id="hum" class="text-3xl">--</p>
  </div>
</div>

<!-- AI -->
<div class="bg-green-900/40 p-4 rounded-xl mb-4">
  <pre id="ai">🤖 รอข้อมูล...</pre>
</div>

<canvas id="chart"></canvas>

</div>

<script>
// ===== GLOBAL =====
let port, reader;
let chart;
let labels=[], tempData=[], humData=[];
let net;

// ===== AI =====
function trainAI(){
  net = new brain.NeuralNetwork({hiddenLayers:[6,6]});

  net.train([
    {input:{temp:0.5,hum:0.8},output:{water:0.1,fert:0.1}},
    {input:{temp:0.7,hum:0.4},output:{water:0.9,fert:0.7}},
    {input:{temp:0.6,hum:0.6},output:{water:0.4,fert:0.3}},
    {input:{temp:0.4,hum:0.9},output:{water:0.0,fert:0.0}}
  ]);
}

function runAI(temp,hum){

  if(isNaN(temp) || isNaN(hum)) return;

  const out = net.run({
    temp: temp/50,
    hum: hum/100
  });

  let water = Math.round(out.water*1000);
  let fert = Math.round(out.fert*50);

  if(hum > 85){
    water = 0;
    fert = 0;
  }

  document.getElementById("ai").innerText =
  `💧 น้ำ: ${water} ml\n🌿 ปุ๋ย: ${fert} g`;
}

// ===== CHART =====
function initChart(){
  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"Temp (°C)",data:tempData},
        {label:"Humidity (%)",data:humData}
      ]
    }
  });
}

// ===== UPDATE =====
function update(temp,hum){

  document.getElementById("temp").innerText = temp+"°C";
  document.getElementById("hum").innerText = hum+"%";

  labels.push(new Date().toLocaleTimeString());
  tempData.push(temp);
  humData.push(hum);

  if(labels.length>12){
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update();
  runAI(temp,hum);
}

// ===== CONNECT USB =====
async function connectUSB(){
  try{
    port = await navigator.serial.requestPort();
    await port.open({ baudRate:115200 });

    const decoder = new TextDecoderStream();
    port.readable.pipeTo(decoder.writable);
    reader = decoder.readable.getReader();

    readLoop();

  }catch{
    alert("❌ เชื่อมต่อไม่ได้");
  }
}

// ===== READ LOOP (เสถียร) =====
async function readLoop(){
  let buffer = "";

  while(true){
    const {value,done} = await reader.read();
    if(done) break;

    buffer += value;

    let lines = buffer.split("\n");

    buffer = lines.pop(); // เก็บเศษไว้

    for(let line of lines){
      line = line.trim();

      if(!line.includes(",")) continue;

      const parts = line.split(",");

      if(parts.length !== 2) continue;

      const temp = parseFloat(parts[0]);
      const hum = parseFloat(parts[1]);

      if(isNaN(temp) || isNaN(hum)) continue;

      update(temp,hum);
    }
  }
}

// ===== INIT =====
document.getElementById("connect").onclick = connectUSB;

initChart();
trainAI();

</script>

</body>
</html>
