<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Farm AI</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/brain.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-emerald-500 via-teal-400 to-blue-400 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-4xl">

  <!-- HEADER -->
  <div class="text-center mb-6 text-white">
    <h1 class="text-4xl font-extrabold">🌱 Smart Farm AI</h1>
    <p class="opacity-80">AI + Bluetooth IoT</p>
  </div>

  <!-- MAIN CARD -->
  <div class="bg-white/20 backdrop-blur-xl rounded-3xl shadow-2xl p-6">

    <!-- STATUS -->
    <div class="flex justify-between items-center mb-6">
      <div id="status" class="bg-red-500 text-white px-4 py-2 rounded-xl font-bold">
        ❌ ยังไม่เชื่อมต่อ
      </div>

      <button id="connect"
        class="bg-blue-600 hover:scale-105 transition text-white px-6 py-3 rounded-xl">
        🔌 Connect
      </button>
    </div>

    <!-- SENSOR -->
    <div class="grid grid-cols-2 gap-6 mb-6">

      <div class="bg-white p-6 rounded-2xl text-center shadow">
        <p>🌡 อุณหภูมิ</p>
        <p id="temp" class="text-4xl font-bold text-red-500">--</p>
      </div>

      <div class="bg-white p-6 rounded-2xl text-center shadow">
        <p>💧 ความชื้น</p>
        <p id="hum" class="text-4xl font-bold text-blue-500">--</p>
      </div>

    </div>

    <!-- AI -->
    <div class="bg-green-200 p-5 rounded-2xl mb-6 shadow">
      <p class="font-bold mb-2">🤖 AI วิเคราะห์</p>
      <pre id="ai">ยังไม่มีข้อมูล</pre>
    </div>

    <!-- CHART -->
    <div class="bg-white p-4 rounded-2xl shadow">
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>

<script>
// ================= GLOBAL =================
let device, server, service, characteristic;
let chart;
let labels = [], tempData = [], humData = [];
let net;

// ================= CHART =================
function initChart() {
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temp", data: tempData },
        { label: "Hum", data: humData }
      ]
    }
  });
}

function updateChart(temp, hum) {
  const time = new Date().toLocaleTimeString();

  labels.push(time);
  tempData.push(temp);
  humData.push(hum);

  if (labels.length > 12) {
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update();
}

// ================= STATUS =================
function setStatus(text, color) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.className = "px-4 py-2 rounded-xl font-bold text-white " + color;
}

// ================= AI =================
function trainAI() {
  net = new brain.NeuralNetwork({ hiddenLayers: [6,6] });

  net.train([
    { input: { temp: 0.5, hum: 0.8 }, output: { water: 0.1, fert: 0.1 } },
    { input: { temp: 0.7, hum: 0.4 }, output: { water: 0.9, fert: 0.7 } },
    { input: { temp: 0.6, hum: 0.6 }, output: { water: 0.4, fert: 0.3 } },
    { input: { temp: 0.4, hum: 0.9 }, output: { water: 0.0, fert: 0.0 } }
  ], { iterations: 2000 });
}

function runAI(temp, hum) {
  const out = net.run({
    temp: temp / 50,
    hum: hum / 100
  });

  let water = Math.round(out.water * 1000);
  let fert = Math.round(out.fert * 50);

  if (hum > 85) {
    water = 0;
    fert = 0;
  }

  document.getElementById("ai").innerText =
    `💧 น้ำ: ${water} ml\n🌿 ปุ๋ย: ${fert} g`;
}

// ================= BLUETOOTH =================
async function connectBluetooth() {
  if (!navigator.bluetooth) {
    alert("❌ ใช้ Chrome Android เท่านั้น");
    return;
  }

  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "BBC micro:bit" }],
      optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
    });

    server = await device.gatt.connect();

    service = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");

    characteristic = await service.getCharacteristic("6e400003-b5a3-f393-e0a9-e50e24dcca9e");

    await characteristic.startNotifications();

    characteristic.addEventListener("characteristicvaluechanged", handleData);

    setStatus("✅ เชื่อมต่อแล้ว", "bg-green-500");

  } catch {
    alert("❌ เชื่อมต่อไม่สำเร็จ");
  }
}

// ================= DATA =================
function handleData(event) {
  const value = new TextDecoder().decode(event.target.value);
  const [temp, hum] = value.trim().split(",").map(Number);

  if (!temp || !hum) return;

  document.getElementById("temp").innerText = temp + " °C";
  document.getElementById("hum").innerText = hum + " %";

  updateChart(temp, hum);
  runAI(temp, hum);
}

// ================= INIT =================
window.onload = () => {
  initChart();
  trainAI();

  document.getElementById("connect")
    .addEventListener("click", connectBluetooth);
};
</script>

</body>
</html>
