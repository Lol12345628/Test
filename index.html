<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Farm AI Bluetooth</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/brain.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gradient-to-br from-emerald-400 via-blue-300 to-indigo-200 min-h-screen flex items-center justify-center p-4">

<div class="bg-white/30 backdrop-blur-2xl shadow-2xl rounded-3xl p-6 w-full max-w-3xl">

  <h1 class="text-3xl font-bold text-center mb-4 text-green-800">
    🌱 Smart Farm AI
  </h1>

  <p id="status" class="text-center mb-4 text-red-500 font-bold">
    ❌ ยังไม่เชื่อมต่อ
  </p>

  <button id="connect"
    class="bg-blue-500 hover:scale-105 transition text-white w-full py-3 rounded-xl mb-6">
    🔌 เชื่อมต่อ Bluetooth
  </button>

  <div class="grid grid-cols-2 gap-4 mb-6">
    <div class="bg-white p-4 rounded-xl text-center shadow">
      🌡 <p id="temp" class="text-2xl font-bold">--</p>
    </div>
    <div class="bg-white p-4 rounded-xl text-center shadow">
      💧 <p id="hum" class="text-2xl font-bold">--</p>
    </div>
  </div>

  <div class="bg-green-100 p-4 rounded-xl mb-4">
    <p class="font-bold">🤖 AI วิเคราะห์</p>
    <pre id="ai">ยังไม่มีข้อมูล</pre>
  </div>

  <canvas id="chart"></canvas>

</div>

<script>
// ================= GLOBAL =================
let device, server, service, characteristic;
let chart;
let labels = [], tempData = [], humData = [];
let net;

// ================= CHART =================
function initChart() {
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temp", data: tempData },
        { label: "Hum", data: humData }
      ]
    }
  });
}

function updateChart(temp, hum) {
  const time = new Date().toLocaleTimeString();

  labels.push(time);
  tempData.push(temp);
  humData.push(hum);

  if (labels.length > 12) {
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update();
}

// ================= STATUS =================
function setStatus(text, color) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.className = "text-center mb-4 font-bold " + color;
}

// ================= AI =================
function trainAI() {
  net = new brain.NeuralNetwork({ hiddenLayers: [6,6] });

  net.train([
    { input: { temp: 0.5, hum: 0.8 }, output: { water: 0.1, fert: 0.1 } },
    { input: { temp: 0.7, hum: 0.4 }, output: { water: 0.9, fert: 0.7 } },
    { input: { temp: 0.6, hum: 0.6 }, output: { water: 0.4, fert: 0.3 } },
    { input: { temp: 0.4, hum: 0.9 }, output: { water: 0.0, fert: 0.0 } }
  ], { iterations: 2000 });
}

function runAI(temp, hum) {
  const output = net.run({
    temp: temp/50,
    hum: hum/100
  });

  let water = Math.round(output.water * 1000);
  let fert = Math.round(output.fert * 50);

  if (hum > 85) {
    water = 0;
    fert = 0;
  }

  document.getElementById("ai").innerText =
    `💧 ${water} ml\n🌿 ${fert} g`;
}

// ================= BLUETOOTH =================
async function connectBluetooth() {
  if (!navigator.bluetooth) {
    alert("❌ ใช้ Chrome Android");
    return;
  }

  device = await navigator.bluetooth.requestDevice({
    filters: [{ namePrefix: "BBC micro:bit" }],
    optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
  });

  server = await device.gatt.connect();
  service = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
  characteristic = await service.getCharacteristic("6e400003-b5a3-f393-e0a9-e50e24dcca9e");

  await characteristic.startNotifications();
  characteristic.addEventListener("characteristicvaluechanged", handleData);

  setStatus("✅ เชื่อมต่อแล้ว", "text-green-600");
}

// ================= DATA =================
function handleData(event) {
  const value = new TextDecoder().decode(event.target.value);
  const [temp, hum] = value.trim().split(",").map(Number);

  if (!temp || !hum) return;

  document.getElementById("temp").innerText = temp + " °C";
  document.getElementById("hum").innerText = hum + " %";

  updateChart(temp, hum);
  runAI(temp, hum);
}

// ================= INIT =================
window.onload = () => {
  initChart();
  trainAI();
  document.getElementById("connect")
    .addEventListener("click", connectBluetooth);
};
</script>

</body>
</html>
