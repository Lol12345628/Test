<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm AI Ultra</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/brain.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-black min-h-screen flex items-center justify-center p-4 text-white">

<!-- BG -->
<div class="fixed inset-0 -z-10">
  <div class="absolute w-[500px] h-[500px] bg-green-500 blur-[150px] opacity-30 top-[-100px] left-[-100px]"></div>
  <div class="absolute w-[500px] h-[500px] bg-blue-500 blur-[150px] opacity-30 bottom-[-100px] right-[-100px]"></div>
</div>

<div class="w-full max-w-5xl">

<!-- HEADER -->
<div class="text-center mb-8">
  <h1 class="text-5xl font-extrabold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">
    🌱 Smart Farm AI
  </h1>
  <p class="text-gray-400">Bluetooth + AI + IoT</p>
</div>

<!-- CARD -->
<div class="bg-white/10 backdrop-blur-2xl border border-white/20 rounded-3xl p-6 shadow-2xl">

<!-- STATUS -->
<div class="flex justify-between items-center mb-6">
  <div id="status" class="px-4 py-2 rounded-full bg-red-500 animate-pulse font-bold">
    ❌ ยังไม่เชื่อมต่อ
  </div>

  <button id="connect"
    class="bg-gradient-to-r from-green-400 to-blue-500 px-6 py-3 rounded-full font-bold hover:scale-110 transition">
    🚀 Connect
  </button>
</div>

<!-- SENSOR -->
<div class="grid grid-cols-2 gap-6 mb-6">
  <div class="bg-black/40 p-6 rounded-2xl text-center">
    <p class="text-gray-400">🌡 Temperature</p>
    <p id="temp" class="text-5xl text-red-400 font-bold">--</p>
  </div>

  <div class="bg-black/40 p-6 rounded-2xl text-center">
    <p class="text-gray-400">💧 Humidity</p>
    <p id="hum" class="text-5xl text-blue-400 font-bold">--</p>
  </div>
</div>

<!-- AI -->
<div class="bg-gradient-to-br from-green-500/20 to-blue-500/20 p-6 rounded-2xl mb-6">
  <p class="font-bold mb-2">🤖 AI วิเคราะห์</p>
  <pre id="ai">ยังไม่มีข้อมูล</pre>
</div>

<!-- CHART -->
<div class="bg-black/40 p-4 rounded-2xl">
  <canvas id="chart"></canvas>
</div>

</div>
</div>

<script>
// ===== GLOBAL =====
let device, characteristic;
let chart;
let labels = [], tempData = [], humData = [];
let net;

// ===== CHART =====
function initChart() {
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temp", data: tempData },
        { label: "Hum", data: humData }
      ]
    }
  });
}

function updateChart(temp, hum) {
  const t = new Date().toLocaleTimeString();

  labels.push(t);
  tempData.push(temp);
  humData.push(hum);

  if (labels.length > 12) {
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update();
}

// ===== STATUS =====
function setStatus(text, color) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.className = "px-4 py-2 rounded-full font-bold text-white " + color;
}

// ===== AI =====
function trainAI() {
  net = new brain.NeuralNetwork({ hiddenLayers: [6,6] });

  net.train([
    { input: { temp:0.5, hum:0.8 }, output:{water:0.1,fert:0.1}},
    { input: { temp:0.7, hum:0.4 }, output:{water:0.9,fert:0.7}},
    { input: { temp:0.6, hum:0.6 }, output:{water:0.4,fert:0.3}},
    { input: { temp:0.4, hum:0.9 }, output:{water:0.0,fert:0.0}}
  ]);
}

function runAI(temp, hum) {
  const out = net.run({
    temp: temp/50,
    hum: hum/100
  });

  let water = Math.round(out.water * 1000);
  let fert = Math.round(out.fert * 50);

  if (hum > 85) {
    water = 0;
    fert = 0;
  }

  document.getElementById("ai").innerText =
    `💧 ${water} ml\n🌿 ${fert} g`;
}

// ===== BLUETOOTH (FIXED 100%) =====
async function connectBluetooth() {

  if (!navigator.bluetooth) {
    alert("❌ ใช้ Chrome Android เท่านั้น");
    return;
  }

  try {
    setStatus("🔍 ค้นหาอุปกรณ์...", "bg-yellow-500");

    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
    });

    setStatus("🔗 กำลังเชื่อมต่อ...", "bg-yellow-500");

    const server = await device.gatt.connect();

    const service = await server.getPrimaryService(
      "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
    );

    characteristic = await service.getCharacteristic(
      "6e400003-b5a3-f393-e0a9-e50e24dcca9e"
    );

    await characteristic.startNotifications();

    characteristic.addEventListener("characteristicvaluechanged", (event) => {

      const value = new TextDecoder().decode(event.target.value);
      console.log("DATA:", value);

      const parts = value.trim().split(",");

      if (parts.length !== 2) return;

      const temp = parseFloat(parts[0]);
      const hum = parseFloat(parts[1]);

      if (isNaN(temp) || isNaN(hum)) return;

      document.getElementById("temp").innerText = temp + "°C";
      document.getElementById("hum").innerText = hum + "%";

      updateChart(temp, hum);
      runAI(temp, hum);
    });

    setStatus("✅ เชื่อมต่อสำเร็จ", "bg-green-500");

  } catch (err) {
    console.error(err);
    setStatus("❌ เชื่อมต่อไม่สำเร็จ", "bg-red-500");
    alert("ERROR: " + err);
  }
}

// ===== INIT =====
window.onload = () => {
  initChart();
  trainAI();
  document.getElementById("connect").onclick = connectBluetooth;
};
</script>

</body>
</html>
