<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/brain.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
.glow {
  box-shadow: 0 0 25px rgba(0,255,150,0.5);
}
</style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-4xl">

<!-- HEADER -->
<div class="text-center mb-6">
  <h1 class="text-4xl font-bold text-green-400">🌱 Smart Farm AI</h1>
  <p class="text-gray-400">Bluetooth + AI Control</p>
</div>

<!-- CARD -->
<div class="bg-white/10 backdrop-blur-xl rounded-2xl p-5 shadow-xl">

<!-- STATUS -->
<div class="flex justify-between items-center mb-4">
  <span id="status" class="px-3 py-1 rounded-full bg-red-500 text-sm">
    ❌ Not Connected
  </span>

  <button id="connect"
    class="bg-green-500 px-4 py-2 rounded-lg hover:scale-105 transition glow">
    🔌 Connect
  </button>
</div>

<!-- SENSOR -->
<div class="grid grid-cols-2 gap-4 mb-4">

<div class="bg-black/40 p-4 rounded-xl text-center">
  🌡 Temp
  <div id="temp" class="text-3xl text-red-400 font-bold">--</div>
</div>

<div class="bg-black/40 p-4 rounded-xl text-center">
  💧 Hum
  <div id="hum" class="text-3xl text-blue-400 font-bold">--</div>
</div>

</div>

<!-- AI -->
<div class="bg-green-500/10 p-4 rounded-xl mb-4">
  <b>🤖 AI Result</b>
  <pre id="ai" class="text-sm mt-2">Waiting...</pre>
</div>

<!-- CHART -->
<canvas id="chart"></canvas>

</div>
</div>

<script>
// ===== GLOBAL =====
let device, charNotify;
let chart;
let labels=[], tempData=[], humData=[];
let net;

// ===== CHART =====
function initChart(){
  chart = new Chart(document.getElementById("chart"), {
    type:"line",
    data:{
      labels,
      datasets:[
        {label:"Temp", data:tempData},
        {label:"Hum", data:humData}
      ]
    }
  });
}

function updateChart(t,h){
  let time = new Date().toLocaleTimeString();

  labels.push(time);
  tempData.push(t);
  humData.push(h);

  if(labels.length>10){
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update();
}

// ===== STATUS =====
function setStatus(text,color){
  let s = document.getElementById("status");
  s.innerText = text;
  s.className = "px-3 py-1 rounded-full text-sm "+color;
}

// ===== AI =====
function trainAI(){
  net = new brain.NeuralNetwork({hiddenLayers:[6,6]});

  net.train([
    {input:{temp:0.5,hum:0.8},output:{w:0.1,f:0.1}},
    {input:{temp:0.7,hum:0.4},output:{w:0.9,f:0.7}},
    {input:{temp:0.6,hum:0.6},output:{w:0.4,f:0.3}},
    {input:{temp:0.4,hum:0.9},output:{w:0.0,f:0.0}}
  ]);
}

function runAI(t,h){

  if(!net) return;

  let out = net.run({
    temp:t/50,
    hum:h/100
  });

  let water = Math.round(out.w*1000);
  let fert = Math.round(out.f*50);

  if(h>85){
    water=0; fert=0;
  }

  document.getElementById("ai").innerText =
  `💧 ${water} ml\n🌿 ${fert} g`;
}

// ===== BLUETOOTH =====
async function connectBluetooth(){

  if(!navigator.bluetooth){
    alert("❌ ใช้ Chrome Android");
    return;
  }

  try{

    setStatus("🔍 Searching","bg-yellow-500");

    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices:true,
      optionalServices:["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
    });

    let server = await device.gatt.connect();

    let service = await server.getPrimaryService(
      "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
    );

    charNotify = await service.getCharacteristic(
      "6e400003-b5a3-f393-e0a9-e50e24dcca9e"
    );

    await charNotify.startNotifications();

    charNotify.addEventListener("characteristicvaluechanged", handleData);

    setStatus("✅ Connected","bg-green-500");

  }catch(e){
    console.error(e);
    setStatus("❌ Fail","bg-red-500");
    alert("Error: "+e);
  }
}

// ===== DATA =====
function handleData(e){

  let val = new TextDecoder().decode(e.target.value).trim();
  console.log(val);

  let parts = val.split(",");

  if(parts.length!==2) return;

  let t = parseFloat(parts[0]);
  let h = parseFloat(parts[1]);

  if(isNaN(t)||isNaN(h)) return;

  document.getElementById("temp").innerText = t+"°C";
  document.getElementById("hum").innerText = h+"%";

  updateChart(t,h);
  runAI(t,h);
}

// ===== INIT =====
window.onload = ()=>{
  initChart();
  trainAI();
  document.getElementById("connect").onclick = connectBluetooth;
};
</script>

</body>
</html>
