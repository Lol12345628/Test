<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Farm AI Ultra</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/brain.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-black min-h-screen flex items-center justify-center p-4 text-white">

<div class="w-full max-w-4xl">

<h1 class="text-4xl text-center mb-6 text-green-400 font-bold">
🌱 Smart Farm AI
</h1>

<div class="bg-white/10 p-6 rounded-2xl">

<!-- STATUS -->
<div class="flex justify-between mb-4">
  <div id="status" class="bg-red-500 px-4 py-2 rounded-full">
    ❌ ยังไม่เชื่อมต่อ
  </div>

  <button id="connect"
    class="bg-green-500 px-4 py-2 rounded-xl">
    🔌 Connect
  </button>
</div>

<!-- SENSOR -->
<div class="grid grid-cols-2 gap-4 mb-4">
  <div class="bg-black/40 p-4 rounded-xl text-center">
    🌡 <p id="temp" class="text-2xl">--</p>
  </div>
  <div class="bg-black/40 p-4 rounded-xl text-center">
    💧 <p id="hum" class="text-2xl">--</p>
  </div>
</div>

<!-- AI -->
<div class="bg-green-900/30 p-4 rounded-xl mb-4">
  <pre id="ai">ยังไม่มีข้อมูล</pre>
</div>

<canvas id="chart"></canvas>

</div>
</div>

<script>
// ===== GLOBAL =====
let device, server, service, characteristic;
let chart;
let labels = [], tempData = [], humData = [];
let net;

// ===== CHART =====
function initChart() {
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temp", data: tempData },
        { label: "Hum", data: humData }
      ]
    }
  });
}

// ===== AI =====
function trainAI() {
  net = new brain.NeuralNetwork({ hiddenLayers: [6,6] });

  net.train([
    { input: { temp:0.5, hum:0.8 }, output:{water:0.1,fert:0.1}},
    { input: { temp:0.7, hum:0.4 }, output:{water:0.9,fert:0.7}},
    { input: { temp:0.6, hum:0.6 }, output:{water:0.4,fert:0.3}},
    { input: { temp:0.4, hum:0.9 }, output:{water:0.0,fert:0.0}}
  ]);
}

// ===== UPDATE =====
function update(temp, hum) {
  document.getElementById("temp").innerText = temp + "°C";
  document.getElementById("hum").innerText = hum + "%";

  labels.push(new Date().toLocaleTimeString());
  tempData.push(temp);
  humData.push(hum);

  if (labels.length > 10) {
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update();
  runAI(temp, hum);
}

// ===== AI RUN =====
function runAI(temp, hum) {
  const out = net.run({
    temp: temp/50,
    hum: hum/100
  });

  let water = Math.round(out.water * 1000);
  let fert = Math.round(out.fert * 50);

  if (hum > 85) {
    water = 0;
    fert = 0;
  }

  document.getElementById("ai").innerText =
    `💧 ${water} ml\n🌿 ${fert} g`;
}

// ===== STATUS =====
function setStatus(text, color) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.className = "px-4 py-2 rounded-full " + color;
}

// ===== BLUETOOTH (แก้ NotFoundError แล้ว) =====
async function connectBluetooth() {

  if (!navigator.bluetooth) {
    alert("❌ มือถือไม่รองรับ\nใช้ Chrome Android เท่านั้น");
    return;
  }

  try {
    setStatus("🔍 กำลังค้นหา...", "bg-yellow-500");

    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
      ]
    });

    device.addEventListener("gattserverdisconnected", () => {
      setStatus("⚠️ หลุดการเชื่อมต่อ", "bg-yellow-500");
    });

    setStatus("🔗 กำลังเชื่อม...", "bg-yellow-500");

    server = await device.gatt.connect();

    service = await server.getPrimaryService(
      "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
    );

    characteristic = await service.getCharacteristic(
      "6e400003-b5a3-f393-e0a9-e50e24dcca9e"
    );

    await characteristic.startNotifications();

    characteristic.addEventListener(
      "characteristicvaluechanged",
      (event) => {
        const val = new TextDecoder().decode(event.target.value);
        console.log("DATA:", val);

        const parts = val.trim().split(",");

        if (parts.length !== 2) return;

        const temp = parseFloat(parts[0]);
        const hum = parseFloat(parts[1]);

        if (isNaN(temp) || isNaN(hum)) return;

        update(temp, hum);
      }
    );

    setStatus("✅ เชื่อมต่อสำเร็จ", "bg-green-500");

  } catch (err) {
    console.error(err);

    if (err.name === "NotFoundError") {
      setStatus("❌ ไม่พบ micro:bit", "bg-red-500");
    } else {
      setStatus("❌ เชื่อมต่อไม่ได้", "bg-red-500");
    }
  }
}

// ===== INIT =====
window.onload = () => {
  initChart();
  trainAI();
  document.getElementById("connect").onclick = connectBluetooth;
};
</script>

</body>
</html>
