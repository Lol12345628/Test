<script>
// ===== GLOBAL =====
let device, server, service, characteristic;
let chart;
let labels = [], tempData = [], humData = [];
let net;

// ===== CHART =====
function initChart() {
  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temp", data: tempData, borderWidth: 2 },
        { label: "Hum", data: humData, borderWidth: 2 }
      ]
    }
  });
}

function updateChart(temp, hum) {
  const t = new Date().toLocaleTimeString();

  labels.push(t);
  tempData.push(temp);
  humData.push(hum);

  if (labels.length > 12) {
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update();
}

// ===== STATUS =====
function setStatus(text, color) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.className = "px-4 py-2 rounded-full font-bold text-white " + color;
}

// ===== AI =====
function trainAI() {
  net = new brain.NeuralNetwork({ hiddenLayers: [6,6] });

  net.train([
    { input: { temp:0.5, hum:0.8 }, output:{water:0.1,fert:0.1}},
    { input: { temp:0.7, hum:0.4 }, output:{water:0.9,fert:0.7}},
    { input: { temp:0.6, hum:0.6 }, output:{water:0.4,fert:0.3}},
    { input: { temp:0.4, hum:0.9 }, output:{water:0.0,fert:0.0}}
  ]);
}

function runAI(temp, hum) {
  const out = net.run({
    temp: temp/50,
    hum: hum/100
  });

  let water = Math.round(out.water * 1000);
  let fert = Math.round(out.fert * 50);

  if (hum > 85) {
    water = 0;
    fert = 0;
  }

  document.getElementById("ai").innerText =
    `💧 ${water} ml\n🌿 ${fert} g`;
}

// ===== BLUETOOTH (FIXED) =====
async function connectBluetooth() {

  if (!navigator.bluetooth) {
    alert("❌ ใช้ Chrome Android เท่านั้น");
    return;
  }

  try {
    setStatus("🔍 กำลังค้นหา...", "bg-yellow-500");

    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true, // 🔥 สำคัญ
      optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
    });

    device.addEventListener("gattserverdisconnected", onDisconnected);

    setStatus("🔗 กำลังเชื่อมต่อ...", "bg-yellow-500");

    server = await device.gatt.connect();

    service = await server.getPrimaryService(
      "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
    );

    characteristic = await service.getCharacteristic(
      "6e400003-b5a3-f393-e0a9-e50e24dcca9e"
    );

    await characteristic.startNotifications();

    characteristic.addEventListener(
      "characteristicvaluechanged",
      handleData
    );

    setStatus("✅ เชื่อมต่อสำเร็จ", "bg-green-500");

  } catch (err) {
    console.error(err);
    setStatus("❌ เชื่อมต่อไม่สำเร็จ", "bg-red-500");
  }
}

// ===== RECONNECT =====
function onDisconnected() {
  setStatus("⚠️ หลุดการเชื่อมต่อ", "bg-yellow-500");

  setTimeout(() => {
    reconnect();
  }, 2000);
}

async function reconnect() {
  try {
    setStatus("🔄 reconnect...", "bg-yellow-500");
    server = await device.gatt.connect();
    setStatus("✅ reconnect สำเร็จ", "bg-green-500");
  } catch {
    setStatus("❌ reconnect ไม่ได้", "bg-red-500");
  }
}

// ===== DATA =====
function handleData(event) {
  const val = new TextDecoder().decode(event.target.value);
  console.log("DATA:", val);

  const parts = val.trim().split(",");

  if (parts.length !== 2) return;

  const temp = parseFloat(parts[0]);
  const hum = parseFloat(parts[1]);

  if (isNaN(temp) || isNaN(hum)) return;

  document.getElementById("temp").innerText = temp + "°C";
  document.getElementById("hum").innerText = hum + "%";

  updateChart(temp, hum);
  runAI(temp, hum);
}

// ===== INIT =====
window.onload = () => {
  initChart();
  trainAI();
  document.getElementById("connect").onclick = connectBluetooth;
};
</script>
