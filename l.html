<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Farm AI Bluetooth</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-green-300 via-blue-200 to-green-100 min-h-screen flex items-center justify-center p-4">

<div class="bg-white/80 backdrop-blur-xl shadow-2xl rounded-3xl p-6 w-full max-w-3xl">

  <h1 class="text-3xl font-bold text-center mb-4 text-green-700">
    🌱 Test (Bluetooth)
  </h1>

  <!-- 🔌 Status -->
  <p id="status" class="text-center mb-4 text-red-500 font-bold">
    ❌ ยังไม่เชื่อมต่อ
  </p>

  <!-- 🔘 Connect -->
  <button id="connect"
    class="bg-blue-500 hover:scale-105 transition text-white w-full py-3 rounded-xl mb-6">
    🔌 เชื่อมต่อ Bluetooth
  </button>

  <!-- Sensor -->
  <div class="grid grid-cols-2 gap-4 mb-6">
    <div class="bg-red-100 p-4 rounded-xl text-center">
      🌡 <p id="temp" class="text-2xl font-bold">--</p>
    </div>
    <div class="bg-blue-100 p-4 rounded-xl text-center">
      💧 <p id="hum" class="text-2xl font-bold">--</p>
    </div>
  </div>

  <!-- AI -->
  <div class="bg-green-100 p-4 rounded-xl mb-4">
    <p class="font-bold">🤖 AI วิเคราะห์</p>
    <pre id="ai">ยังไม่มีข้อมูล</pre>
  </div>

  <!-- Chart -->
  <canvas id="chart"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// ================== GLOBAL ==================
let device, server, service, characteristic;
let chart;
let labels = [], tempData = [], humData = [];

// ================== CHART ==================
function initChart() {
  const ctx = document.getElementById("chart");
  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        { label: "Temp", data: tempData, borderWidth: 2 },
        { label: "Hum", data: humData, borderWidth: 2 }
      ]
    }
  });
}

// ================== UPDATE CHART ==================
function updateChart(temp, hum) {
  const time = new Date().toLocaleTimeString();

  labels.push(time);
  tempData.push(temp);
  humData.push(hum);

  if (labels.length > 10) {
    labels.shift();
    tempData.shift();
    humData.shift();
  }

  chart.update();
}

// ================== BLUETOOTH ==================
async function connectBluetooth() {
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: "BBC micro:bit" }],
      optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
    });

    server = await device.gatt.connect();

    service = await server.getPrimaryService(
      "6e400001-b5a3-f393-e0a9-e50e24dcca9e"
    );

    characteristic = await service.getCharacteristic(
      "6e400003-b5a3-f393-e0a9-e50e24dcca9e"
    );

    await characteristic.startNotifications();

    characteristic.addEventListener(
      "characteristicvaluechanged",
      handleData
    );

    document.getElementById("status").innerText = "✅ เชื่อมต่อแล้ว";

    // 🔄 auto reconnect
    device.addEventListener("gattserverdisconnected", () => {
      document.getElementById("status").innerText = "⚠️ หลุดการเชื่อมต่อ";
      reconnect();
    });

  } catch (err) {
    alert("❌ เชื่อมต่อไม่สำเร็จ");
  }
}

// ================== RECONNECT ==================
async function reconnect() {
  try {
    server = await device.gatt.connect();
    document.getElementById("status").innerText = "🔄 reconnect สำเร็จ";
  } catch {
    document.getElementById("status").innerText = "❌ reconnect ไม่ได้";
  }
}

// ================== HANDLE DATA ==================
function handleData(event) {
  const value = new TextDecoder().decode(event.target.value);
  const parts = value.trim().split(",");

  if (parts.length === 2) {
    const temp = parseFloat(parts[0]);
    const hum = parseFloat(parts[1]);

    document.getElementById("temp").innerText = temp + " °C";
    document.getElementById("hum").innerText = hum + " %";

    updateChart(temp, hum);
    runAI(temp, hum);
  }
}

// ================== AI ==================
async function runAI(temp, hum) {
  document.getElementById("ai").innerText = "⏳ AI กำลังคิด...";

  if (hum > 85) {
    document.getElementById("ai").innerText =
      "💧 น้ำ: 0 ml\n🌿 ปุ๋ย: 0 g\n📊 ดินชื้น";
    return;
  }

  try {
    const res = await fetch("https://your-backend.onrender.com/ai", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ temp, hum, plant: "ข้าว" })
    });

    const data = await res.json();

    document.getElementById("ai").innerText =
      `💧 ${data.water} ml\n🌿 ${data.fertilizer} g\n📊 ${data.reason}`;

  } catch {
    document.getElementById("ai").innerText = "❌ AI error";
  }
}

// ================== INIT ==================
document.getElementById("connect")
  .addEventListener("click", connectBluetooth);

initChart();

</script>
</body>
</html>
