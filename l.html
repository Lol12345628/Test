<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>USB Fix</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex justify-center items-center min-h-screen">

<div class="bg-white/10 p-6 rounded-2xl w-96">

<h1 class="text-xl text-green-400 mb-4 text-center">
🔌 USB micro:bit
</h1>

<p id="status" class="mb-4 text-red-400">❌ ยังไม่เชื่อมต่อ</p>

<button id="connect"
class="bg-blue-500 w-full py-2 rounded-xl mb-4">
Connect USB
</button>

<p>🌡 <span id="temp">--</span></p>
<p>💧 <span id="hum">--</span></p>

</div>

<script>
let port, reader;

function setStatus(t,c){
  const el = document.getElementById("status");
  el.innerText = t;
  el.className = c;
}

async function connectUSB(){

  if(!("serial" in navigator)){
    alert("❌ Browser ไม่รองรับ (ใช้ Chrome)");
    return;
  }

  try{
    setStatus("🔍 กำลังเลือกอุปกรณ์...","text-yellow-400");

    port = await navigator.serial.requestPort();

    await port.open({ baudRate:115200 });

    setStatus("✅ เชื่อมต่อแล้ว","text-green-400");

    const decoder = new TextDecoderStream();
    port.readable.pipeTo(decoder.writable);
    reader = decoder.readable.getReader();

    readLoop();

  }catch(e){
    console.error(e);
    setStatus("❌ เชื่อมต่อไม่ได้","text-red-400");
  }
}

async function readLoop(){
  let buffer="";

  while(true){
    const {value,done} = await reader.read();
    if(done) break;

    buffer += value;

    let lines = buffer.split("\n");
    buffer = lines.pop();

    for(let line of lines){

      if(!line.includes(",")) continue;

      let [t,h] = line.split(",");

      let temp = parseFloat(t);
      let hum = parseFloat(h);

      if(isNaN(temp)||isNaN(hum)) continue;

      document.getElementById("temp").innerText = temp;
      document.getElementById("hum").innerText = hum;
    }
  }
}

document.getElementById("connect").onclick = connectUSB;
</script>

</body>
</html>
